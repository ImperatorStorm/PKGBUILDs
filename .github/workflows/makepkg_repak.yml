name: Makepkg CI - repak

env:
  GPG_TTY: $(tty)

on:
  push:
    paths:
        - "repak/**"
        - "makepkg.conf"
        - ".github/workflows/makepkg_repak.yml"
  workflow_dispatch:

jobs:
  pkgbuild:
    runs-on: ubuntu-latest
    container: archlinux/archlinux:base-devel
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Cache sccache output
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/sccache
    - name: Makepkg
      run: |
        echo ${{ github.event.name }}
        pacman -Syu --noconfirm namcap sccache
        ./.ci/sccache-setup.sh
        useradd builder -m
        echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
        chmod -R a+rw .
        BASEDIR="$PWD"
        cd repak
        sudo -u builder echo -n "${{ secrets.GPG_PRIVATE_KEY }}" | sudo -u builder base64 --decode | sudo -u builder gpg --import --batch --no-tty
        sudo -u builder env PATH="/usr/lib/sccache/bin:${PATH}" makepkg -s --sign --noconfirm --noarchive --config=../makepkg.conf
    - name: Namcap
      run: cd repak && namcap *.pkg.tar.zst
    - name: Upload Packages
      uses: actions/upload-artifact@v4
      with:
          name: packages
          path: |
            repak/*.zst
            repak/*.zst.sig
            !repak/*debug*.zst
            !repak/*debug*.zst.sig
    #        ${{ steps.makepkg.outputs.pkgfile0 }}.sig