name: Makepkg CI - repak

env:
  GPG_TTY: $(tty)
  SCCACHE_CACHE_SIZE: 5G
  SCCACHE_GHA_ENABLED: on

on:
  push:
    paths:
        - "repak/**"
        - "makepkg.conf"
        - ".github/workflows/makepkg_repak.yml"
  workflow_dispatch:

jobs:
  pkgbuild:
    runs-on: ubuntu-latest
    container: archlinux/archlinux:base-devel
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Configure sccache
      uses: actions/github-script@v7
      with:
        script: |
          core.exportVariable('ACTIONS_RESULTS_URL', process.env.ACTIONS_RESULTS_URL || '');
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');
    - name: Add sccache wrappers to PATH
      run: |
        ./.ci/sccache-setup.sh
    - name: Makepkg
      run: |
        pacman -Syu --noconfirm --needed namcap sccache
        useradd builder -m
        echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
        chmod -R a+rw .
        chown -R builder:root /home/builder
        BASEDIR="$PWD"
        cd repak
        sudo -u builder echo -n "${{ secrets.GPG_PRIVATE_KEY }}" | sudo -u builder base64 --decode | sudo -u builder gpg --import --batch --no-tty
        sudo -u builder makepkg -s --sign --noconfirm --config=../makepkg.conf
    - name: Namcap
      run: cd repak && namcap *.pkg.tar.zst
    - name: Upload Packages
      uses: actions/upload-artifact@v4
      with:
          name: packages
          path: |
            repak/*.zst
            repak/*.zst.sig
    #        ${{ steps.makepkg.outputs.pkgfile0 }}.sig