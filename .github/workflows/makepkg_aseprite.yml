name: Makepkg CI - aseprite

env:
  GPG_TTY: $(tty)
  SCCACHE_GHA_ENABLED: on

on:
  push:
    paths:
        - "aseprite/**"
        - "makepkg.conf"
        - ".github/workflows/makepkg_aseprite.yml"
  workflow_dispatch:

jobs:
  pkgbuild:
    runs-on: ubuntu-latest
    container: archlinux/archlinux:base-devel
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Run sccache-cache
      uses: mozilla-actions/sccache-action@v0.0.10
    - name: Add sccache compiler symlinks
      run: |
        ./.ci/sccache-setup.sh
    - name: Makepkg
      run: |
        pacman -Syu --noconfirm --needed namcap
        useradd builder -m
        echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
        chmod -R a+rw .
        chown -R builder:root /home/builder
        BASEDIR="$PWD"
        cd aseprite
        sudo -u builder makepkg -s --noconfirm --noarchive --config=../makepkg.conf
    # - name: Namcap
    #   run: cd aseprite && namcap *.pkg.tar.zst