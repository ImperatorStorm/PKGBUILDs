name: Makepkg CI - aseprite

env:
  GPG_TTY: $(tty)
  SCCACHE_CACHE_SIZE: 5G
  SCCACHE_GHA_ENABLED: on

on:
  push:
    paths:
        - "aseprite/**"
        - "makepkg.conf"
        - ".github/workflows/makepkg_aseprite.yml"
  workflow_dispatch:

jobs:
  pkgbuild:
    runs-on: ubuntu-latest
    container: archlinux/archlinux:base-devel
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Configure sccache
      uses: actions/github-script@v7
      with:
        script: |
          core.exportVariable('ACTIONS_RESULTS_URL', process.env.ACTIONS_RESULTS_URL || '');
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');
    - name: Add sccache wrappers to PATH
      run: |
        ./.ci/sccache-setup.sh
    - name: Makepkg
      run: |
        pacman -Syu --noconfirm --needed sccache
        useradd builder -m
        echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
        chmod -R a+rw .
        chown -R builder:root /home/builder
        BASEDIR="$PWD"
        cd aseprite
        sudo -u builder makepkg -s --noconfirm --noarchive --config=../makepkg.conf
    # - name: Namcap
    #   run: cd aseprite && namcap *.pkg.tar.zst