name: Makepkg CI - aseprite

env:
  GPG_TTY: $(tty)
  SCCACHE_CACHE_SIZE: 5G

on:
  push:
    paths:
        - "aseprite/**"
        - "makepkg.conf"
        - ".github/workflows/makepkg_aseprite.yml"
  workflow_dispatch:

jobs:
  pkgbuild:
    runs-on: ubuntu-latest
    container: archlinux/archlinux:base-devel
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Cache sccache output
      uses: actions/cache@v5
      with:
        path: |
          /home/builder/.cache/sccache
        key: ${{ hashFiles('**/makepkg.conf') }}
    - name: Add sccache wrappers to PATH
      run: |
        ./.ci/sccache-setup.sh
    - name: Makepkg
      run: |
        pacman -Syu --noconfirm --needed namcap sccache
        useradd builder -m
        echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
        chmod -R a+rw .
        BASEDIR="$PWD"
        cd aseprite
        sudo -u builder makepkg -s --sign --noconfirm --noarchive --config=../makepkg.conf
    # - name: Namcap
    #   run: cd aseprite && namcap *.pkg.tar.zst