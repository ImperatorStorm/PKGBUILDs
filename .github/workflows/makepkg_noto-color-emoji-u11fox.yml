name: Makepkg CI - noto-color-emoji-u11fox

env:
  GPG_TTY: $(tty)
  SCCACHE_CACHE_SIZE: 5G
  SCCACHE_GHA_ENABLED: on

on:
  push:
    paths:
        - "noto-color-emoji-u11fox/**"
        - "makepkg.conf"
        - ".github/workflows/makepkg_noto-color-emoji-u11fox.yml"
  workflow_dispatch:

jobs:
  pkgbuild:
    runs-on: ubuntu-latest
    container: archlinux/archlinux:base-devel
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Run sccache-cache
      uses: mozilla-actions/sccache-action@v0.0.10
    - name: Add sccache compiler symlinks
      run: |
        ./.ci/sccache-setup.sh
    - name: Makepkg
      run: |
        pacman-key --init
        pacman-key --add CI-pub.key
        pacman-key --lsign-key 6C1A7D4F8106E34F40AB35645FDA85C06EFB9086
        pacman -Syu --noconfirm --needed namcap git rust perl-rename
        useradd builder -m
        echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
        BASEDIR="$PWD"
        git clone https://aur.archlinux.org/paru.git
        chmod -R a+rw .
        chown -R builder:root /home/builder
        cd paru
        sudo -u builder echo -n "${{ secrets.GPG_PRIVATE_KEY }}" | sudo -u builder base64 --decode | sudo -u builder gpg --import --batch --no-tty
        sudo -u builder makepkg -si --sign --noconfirm --config=../makepkg.conf
        cd ..
        sudo -u builder paru -S resvg nanoemoji python-nototools --noconfirm --failfast --nocheck --mflags --config=/__w/PKGBUILDs/PKGBUILDs/makepkg.conf
        cd noto-color-emoji-u11fox
        sudo -u builder makepkg -s --sign --noconfirm --config=../makepkg.conf
        perl-rename 's/://' *
    - name: Namcap
      run: cd noto-color-emoji-u11fox && namcap *.pkg.tar.zst
    - name: Upload Packages
      uses: actions/upload-artifact@v4
      with:
          name: packages
          path: |
            noto-color-emoji-u11fox/*.zst
            noto-color-emoji-u11fox/*.zst.sig
